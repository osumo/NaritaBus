<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>診断型検索 - 北海道物産EC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <!-- 
            [要件: 質問形式絞り込み ☆]
            - 質問「どっちの気分？ A: ガッツリ海鮮 / B: 甘いスイーツ」等の選択肢
            - 選択結果に基づいて商品をフィルタリング
        -->
        <h2 class="text-center mb-4">あなたにぴったりの北海道を探す</h2>
        
        <div id="diagnosis-card" class="card mx-auto" style="max-width: 600px;">
            <div class="card-body text-center">
                <h5 class="card-title">Q1. 今日の気分は？</h5>
                <div class="d-grid gap-3 mt-4">
                    <button class="btn btn-outline-primary btn-lg">A. 海の幸を存分に味わいたい</button>
                    <button class="btn btn-outline-success btn-lg">B. 大地の恵み（スイーツ・乳製品）を楽しみたい</button>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5">
            <a href="/" class="btn btn-secondary">トップに戻る</a>
        </div>
    </div>
</body>
</html>
