<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧 - 北海道物産EC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>商品一覧</h2>
        <p class="text-muted">カテゴリ、地域、値段でのフィルタリング機能を実装予定</p>
        <hr>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">サンプル商品</h5>
                        <p class="card-text">商品の説明がここに入ります。</p>
                        <a href="/product/detail?id=1" class="btn btn-primary">詳細を見る</a>
                    </div>
                </div>
            </div>
        </div>
        <a href="/" class="btn btn-secondary">トップに戻る</a>
    </div>

</html>
