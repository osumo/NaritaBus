<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>決済確認 - 北海道物産EC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">ご購入内容の確認</h2>
        
        <div class="row">
            <div class="col-md-8">
                <!-- 注文商品一覧 -->
                <div class="card mb-4">
                    <div class="card-header">注文商品</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            北海道産 〇〇
                            <span>¥ 1,200</span>
                        </li>
                    </ul>
                </div>

                <!-- [要件: 生産者へのチップ ☆] -->
                <div class="card mb-4 border-primary">
                    <div class="card-header bg-primary text-white">生産者を直接応援！「チップ」の選択</div>
                    <div class="card-body">
                        <p>美味しい食材を届けてくれる生産者さんにチップを送ることができます。</p>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="tip" id="tip0" autocomplete="off" checked>
                            <label class="btn btn-outline-primary" for="tip0">なし</label>
                            
                            <input type="radio" class="btn-check" name="tip" id="tip100" autocomplete="off">
                            <label class="btn btn-outline-primary" for="tip100">¥ 100</label>
                            
                            <input type="radio" class="btn-check" name="tip" id="tip500" autocomplete="off">
                            <label class="btn btn-outline-primary" for="tip500">¥ 500</label>
                            
                            <input type="radio" class="btn-check" name="tip" id="tipCustom" autocomplete="off">
                            <label class="btn btn-outline-primary" for="tipCustom">カスタム</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">お支払い合計</h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span>商品合計</span>
                            <span>¥ 1,200</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>送料</span>
                            <span>¥ 800</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>チップ</span>
                            <span id="display-tip">¥ 0</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <strong>合計</strong>
                            <strong class="text-danger h4">¥ 2,000</strong>
                        </div>
                        <form action="/checkout/complete" method="post">
                            <button type="submit" class="btn btn-success btn-lg w-100">購入を確定する</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
