<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイアカウント - 北海道物産EC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>マイアカウント</h2>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">ユーザーステータス</div>
                    <div class="card-body">
                        <h5>ランク: <span class="badge bg-warning text-dark">GOLD</span></h5>
                        <p>現在のポイント: 1,250 pt</p>
                        <hr>
                        <h6>育成要素 (☆)</h6>
                        <p>現在のレベル: Lv.5</p>
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" style="width: 60%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <a href="/" class="btn btn-secondary">トップに戻る</a>
    </div>
</body>
</html>
